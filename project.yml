# ABOUTME: XcodeGen project specification for the Countdown menu bar app.
# ABOUTME: Defines macOS app target and unit test target.

name: Countdown
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.countdown
settings:
  SWIFT_VERSION: "6.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"
targets:
  Countdown:
    type: application
    platform: macOS
    sources:
      - Countdown
    info:
      path: Countdown/Info.plist
      properties:
        LSUIElement: true
    settings:
      INFOPLIST_FILE: Countdown/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.countdown.app
      PRODUCT_NAME: Countdown
      ENABLE_HARDENED_RUNTIME: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Countdown/Countdown.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    dependencies:
      - package: Sparkle
  CountdownTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CountdownTests
    dependencies:
      - target: Countdown
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.countdown.tests
